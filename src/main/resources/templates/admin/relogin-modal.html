<!-- ===== MODAL ĐĂNG NHẬP LẠI (TOKEN HẾT HẠN) ===== -->
<div id="rf-relogin-overlay" style="
    display:none; position:fixed; inset:0; z-index:99999;
    background:rgba(15,23,42,0.72); backdrop-filter:blur(6px);
    align-items:center; justify-content:center;">
    <div style="
        background:#fff; border-radius:20px; width:92%; max-width:420px;
        box-shadow:0 24px 60px rgba(0,0,0,0.22);
        animation:rfLoginIn .22s cubic-bezier(.22,1,.36,1);
        overflow:hidden;">
        <!-- Banner -->
        <div style="background:linear-gradient(135deg,#0f172a,#1e3a8a);padding:28px 28px 22px;">
            <div style="width:48px;height:48px;border-radius:14px;
                        background:rgba(255,255,255,0.12);
                        display:flex;align-items:center;justify-content:center;
                        font-size:22px;margin-bottom:14px;">🔐</div>
            <h2 style="color:#fff;font-size:18px;font-weight:700;margin:0 0 6px;">
                Phiên đăng nhập hết hạn
            </h2>
            <p style="color:rgba(255,255,255,0.62);font-size:13px;margin:0;">
                Vui lòng đăng nhập lại để tiếp tục sử dụng hệ thống.
            </p>
        </div>
        <!-- Form -->
        <div style="padding:26px 28px 28px;">
            <div style="margin-bottom:14px;">
                <label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:6px;">
                    Tên đăng nhập
                </label>
                <input id="rf-username" type="text" placeholder="Nhập tên đăng nhập"
                       onkeydown="if(event.key==='Enter')rfSubmitLogin()"
                       style="width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;
                              border-radius:10px;font-size:14px;outline:none;
                              box-sizing:border-box;transition:border-color .2s;"
                       onfocus="this.style.borderColor='#2563eb'"
                       onblur="this.style.borderColor='#e2e8f0'">
            </div>
            <div style="margin-bottom:20px;">
                <label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:6px;">
                    Mật khẩu
                </label>
                <input id="rf-password" type="password" placeholder="Nhập mật khẩu"
                       onkeydown="if(event.key==='Enter')rfSubmitLogin()"
                       style="width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;
                              border-radius:10px;font-size:14px;outline:none;
                              box-sizing:border-box;transition:border-color .2s;"
                       onfocus="this.style.borderColor='#2563eb'"
                       onblur="this.style.borderColor='#e2e8f0'">
            </div>
            <div id="rf-login-msg" style="display:none;margin-bottom:14px;
                padding:9px 12px;border-radius:9px;font-size:13px;font-weight:500;"></div>
            <button onclick="rfSubmitLogin()" id="rf-login-btn" style="
                width:100%;padding:11px;border:none;border-radius:12px;
                background:linear-gradient(135deg,#1e3a8a,#2563eb);
                color:#fff;font-size:14px;font-weight:700;cursor:pointer;
                transition:opacity .15s,transform .1s;">
                Đăng nhập lại
            </button>
        </div>
    </div>
</div>
<style>
    @keyframes rfLoginIn {
        from { transform: scale(.92) translateY(20px); opacity: 0; }
        to   { transform: scale(1)   translateY(0);    opacity: 1; }
    }
</style>
