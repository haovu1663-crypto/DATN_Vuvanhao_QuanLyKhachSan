<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<body>

<th:block th:fragment="content">
    <!-- ===== MAIN: SERVICE ROOM ===== -->
    <main id="view-service" class="flex-1 flex flex-col overflow-y-auto relative" style="display:none;">
        <div style="display:flex; flex-direction:column; gap:1.5rem; padding: 2rem;">

            <!-- Header card -->
            <div class="sv-header-card">
                <div class="sv-header-left">
                    <span class="sv-header-icon"><i class="fas fa-concierge-bell"></i></span>
                    <div>
                        <h2 class="sv-title">Phòng đang sử dụng dịch vụ</h2>
                        <p class="sv-subtitle">Danh sách khách đang check-in tại chi nhánh</p>
                    </div>
                </div>
                <div style="display:flex; align-items:center; gap:12px;">
                    <div class="sv-search-wrap">
                        <span class="sv-search-icon"><i class="fas fa-search"></i></span>
                        <input
                                type="text"
                                id="svSearchInput"
                                class="sv-search-input"
                                placeholder="Tìm theo tên phòng..."
                                oninput="svFilterRooms(this.value)"
                        />
                    </div>
                    <button class="sv-add-service-header-btn" onclick="svOpenAddService(null, null)">
                        <i class="fas fa-plus"></i>
                        Add Service
                    </button>
                </div>
            </div>

            <!-- Bảng danh sách -->
            <div class="sv-table-card">
                <table class="sv-table">
                    <thead>
                    <tr>
                        <th>ID Booking</th>
                        <th>Tên phòng</th>
                        <th>Tên khách</th>
                        <th>Dịch vụ</th>
                    </tr>
                    </thead>
                    <tbody id="svTableBody">
                    <tr>
                        <td colspan="4" class="sv-empty">
                            <i class="fas fa-spinner fa-spin"></i> Đang tải dữ liệu...
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Trạng thái không có dữ liệu (ẩn/hiện bằng JS) -->
            <div id="svEmptyState" class="sv-empty-state" style="display:none;">
                <i class="fas fa-door-closed"></i>
                <p>Không có phòng nào đang sử dụng dịch vụ.</p>
            </div>

        </div>
    </main>
</th:block>

</body>
</html>
