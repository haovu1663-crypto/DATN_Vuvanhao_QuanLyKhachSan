<!-- ===== VIEW ADD EMPLOYEE ===== -->
<main id="view-add-employee" class="flex-1 flex-col overflow-y-auto relative" style="display:none;">
    <header class="sticky top-0 z-10 bg-white/80 backdrop-blur-md h-20 border-b border-slate-200 flex items-center justify-between px-10">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">Thêm nhân viên mới</h1>
            <p class="text-xs text-slate-500 font-medium">Dashboard / Employees / Add</p>
        </div>
        <button onclick="switchToView('manage-employee'); empLoadList()"
                class="flex items-center gap-2 px-4 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl font-semibold text-sm transition-all">
            <i class="fas fa-arrow-left"></i> Quay lại danh sách
        </button>
    </header>

    <!-- ===== INLINE EMPLOYEE FORM (thay thế iframe) ===== -->
    <div class="flex-1 w-full flex items-start justify-center py-10 px-4" style="background:var(--emp-cream,#f5f2ec);">



        <div id="emp-form-card">
            <!-- BANNER -->
            <div class="emp-banner">
                <div class="emp-banner-inner">
                    <div class="emp-banner-icon">👔</div>
                    <div class="emp-banner-text">
                        <h2>Thêm nhân viên mới</h2>
                        <p>Điền đầy đủ thông tin để tạo tài khoản nhân viên</p>
                    </div>
                </div>
                <div class="emp-banner-steps">
                    <div class="emp-step-dot active"></div>
                    <div class="emp-step-dot active"></div>
                    <div class="emp-step-dot active"></div>
                    <div class="emp-step-dot" style="flex:3;"></div>
                </div>
            </div>

            <!-- FORM BODY -->
            <div class="emp-form-body">

                <div class="emp-section-label">Thông tin cơ bản</div>

                <!-- Họ và tên -->
                <div class="emp-field">
                    <label for="emp-name">Họ và tên <span class="req">*</span></label>
                    <div class="emp-input-wrap">
                        <span class="emp-input-icon">👤</span>
                        <input class="emp-input" id="emp-name" type="text" placeholder="Nguyễn Văn A" autocomplete="name">
                    </div>
                </div>

                <!-- Chức vụ + Lương -->
                <div class="emp-field-row">
                    <div class="emp-field">
                        <label for="emp-department">Chức vụ <span class="req">*</span></label>
                        <div class="emp-input-wrap">
                            <span class="emp-input-icon">🏷️</span>
                            <select class="emp-select" id="emp-department" onchange="empUpdateDeptBadge(this)">
                                <option value="" disabled selected>Chọn chức vụ...</option>
                                <option value="RECEPTIONIST">Lễ tân (Receptionist)</option>
                                <option value="CLEANING_STAFF">Dọn phòng (Cleaning Staff)</option>
                            </select>
                            <span class="emp-select-arrow">▾</span>
                        </div>
                        <div class="emp-dept-badge" id="emp-dept-badge">
                            <span id="emp-dept-badge-text"></span>
                        </div>
                    </div>
                    <div class="emp-field">
                        <label for="emp-salary">Lương (VNĐ/tháng) <span class="req">*</span></label>
                        <div class="emp-input-wrap">
                            <span class="emp-salary-prefix">₫</span>
                            <input class="emp-input emp-salary-input" id="emp-salary" type="text"
                                   placeholder="6,500,000" oninput="empFormatSalary(this)" data-raw="">
                        </div>
                        <span class="emp-field-hint">Tối thiểu 6.500.000 ₫</span>
                    </div>
                </div>

                <!-- Địa điểm làm việc -->
                <div class="emp-field">
                    <label for="emp-location">Địa điểm làm việc <span class="req">*</span></label>
                    <div class="emp-input-wrap">
                        <span class="emp-input-icon">📍</span>
                        <select class="emp-select" id="emp-location">
                            <option value="" disabled selected>Chọn địa điểm làm việc...</option>
                            <option value="Số 1 đường Nguyễn Chí Thanh, Hà Nội">Số 1 đường Nguyễn Chí Thanh, Hà Nội</option>
                            <option value="Số 2 Lê Đại Hành, Hà Nội">Số 2 Lê Đại Hành, Hà Nội</option>
                            <option value="Số 3 đường Lê Lợi, Ninh Bình">Số 3 đường Lê Lợi, Ninh Bình</option>
                            <option value="Số 4 Trần Quốc Nghiễn, Hạ Long">Số 4 Trần Quốc Nghiễn, Hạ Long</option>
                        </select>
                        <span class="emp-select-arrow">▾</span>
                    </div>
                </div>

                <hr class="emp-divider">
                <div class="emp-section-label">Thông tin liên hệ</div>

                <!-- Email -->
                <div class="emp-field">
                    <label for="emp-email">Email <span class="req">*</span></label>
                    <div class="emp-input-wrap">
                        <span class="emp-input-icon">✉️</span>
                        <input class="emp-input" id="emp-email" type="email" placeholder="nhanvien@grandhotel.vn" autocomplete="email">
                    </div>
                </div>

                <!-- Số điện thoại -->
                <div class="emp-field">
                    <label for="emp-phone">Số điện thoại <span class="req">*</span></label>
                    <div class="emp-input-wrap">
                        <span class="emp-input-icon">📱</span>
                        <input class="emp-input" id="emp-phone" type="tel" placeholder="0912 345 678" maxlength="11">
                    </div>
                </div>

                <hr class="emp-divider">
                <div class="emp-section-label">Tài khoản đăng nhập</div>

                <!-- Username + Password -->
                <div class="emp-field-row">
                    <div class="emp-field">
                        <label for="emp-username">Tên đăng nhập <span class="req">*</span></label>
                        <div class="emp-input-wrap">
                            <span class="emp-input-icon">🔖</span>
                            <input class="emp-input" id="emp-username" type="text" placeholder="nguyenvana" autocomplete="username">
                        </div>
                        <span class="emp-field-hint">Chữ thường, số, dấu gạch dưới</span>
                    </div>
                    <div class="emp-field">
                        <label for="emp-password">Mật khẩu <span class="req">*</span></label>
                        <div class="emp-input-wrap">
                            <span class="emp-input-icon">🔒</span>
                            <input class="emp-input" id="emp-password" type="password"
                                   placeholder="Tối thiểu 8 ký tự" autocomplete="new-password"
                                   oninput="empCheckPasswordStrength(this.value)">
                            <button class="emp-pw-toggle" type="button" onclick="empTogglePassword()" id="emp-pw-toggle-btn">👁️</button>
                        </div>
                        <div class="emp-pw-strength">
                            <div class="emp-pw-bar" id="emp-pw-bar-0"></div>
                            <div class="emp-pw-bar" id="emp-pw-bar-1"></div>
                            <div class="emp-pw-bar" id="emp-pw-bar-2"></div>
                            <div class="emp-pw-bar" id="emp-pw-bar-3"></div>
                        </div>
                        <span class="emp-pw-hint" id="emp-pw-hint">Nhập mật khẩu để xem độ mạnh</span>
                    </div>
                </div>

            </div><!-- end emp-form-body -->

            <!-- FOOTER -->
            <div class="emp-form-footer">
                <button class="emp-btn-cancel" type="button" onclick="empResetForm()">Hủy</button>
                <button class="emp-btn-submit" type="button" id="emp-btn-submit" onclick="empSubmit()">
                    <span>✅</span> Tạo nhân viên
                </button>
            </div>
        </div><!-- end emp-form-card -->
    </div>


</main>
