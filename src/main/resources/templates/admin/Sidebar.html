<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<body>

<th:block th:fragment="sidebar">
    <!-- ===== SIDEBAR ===== -->
    <aside class="w-72 bg-slate-950 text-slate-400 flex flex-col shadow-2xl z-20 overflow-y-auto scrollbar-sidebar">
        <div class="p-8 border-b border-slate-900">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-500/20">
                    <i class="fas fa-hotel text-white text-xl"></i>
                </div>
                <span class="text-white text-xl font-bold tracking-tight">GrandHotel</span>
            </div>
        </div>

        <nav class="flex-1 mt-8 px-6 space-y-3">
            <p class="text-[10px] uppercase font-bold tracking-widest text-slate-600 mb-4 ml-2">Main Menu</p>
            <a href="#" id="menuBooking" class="sidebar-item flex items-center gap-4 p-3.5 rounded-xl text-sm font-semibold">
                <i class="fas fa-calendar-check text-lg"></i> Booking Room
            </a>
            <a href="#" id="menuResetStatus" class="sidebar-item flex items-center gap-4 p-3.5 rounded-xl text-sm font-semibold">
                <i class="fas fa-sync-alt text-lg"></i> Reset Status
            </a>
            <a href="#" id="menuCheckIn" class="sidebar-item flex items-center gap-4 p-3.5 rounded-xl text-sm font-semibold">
                <i class="fas fa-door-open text-lg"></i> Check In Room
            </a>
            <!-- ===== NÚT CHECK OUT (thêm mới ngay dưới Check In) ===== -->
            <a href="#" id="menuCheckOut" class="sidebar-item flex items-center gap-4 p-3.5 rounded-xl text-sm font-semibold">
                <i class="fas fa-door-closed text-lg"></i> Check Out Room
            </a>
            <a href="#" id="menuService" class="sidebar-item flex items-center gap-4 p-3.5 rounded-xl text-sm font-semibold">
                <i class="fas fa-concierge-bell text-lg"></i> Service Room
            </a>

            <p class="text-[10px] uppercase font-bold tracking-widest text-slate-600 mt-6 mb-4 ml-2">Room Types</p>
            <a href="javascript:void(0)" id="menuAddRoomType" class="sidebar-item flex items-center gap-4 p-3.5 rounded-xl text-sm font-semibold">
                <i class="fas fa-layer-group text-lg"></i> Add Room Type
            </a>
            <a href="javascript:void(0)" id="menuUpdateRoomType" class="sidebar-item flex items-center gap-4 p-3.5 rounded-xl text-sm font-semibold">
                <i class="fas fa-edit text-lg"></i> Update Room Type
            </a>
        </nav>

        <div class="px-6 pb-2 space-y-3">
            <p class="text-[10px] uppercase font-bold tracking-widest text-slate-600 mb-2 ml-2">Manage Rooms</p>
            <a href="javascript:void(0)" id="menuAdd" class="sidebar-item flex items-center gap-4 p-3.5 rounded-xl text-sm font-semibold">
                <i class="fas fa-plus-circle text-lg"></i> Add Room
            </a>
            <a href="javascript:void(0)" id="menuUpdate" class="sidebar-item flex items-center gap-4 p-3.5 rounded-xl text-sm font-semibold">
                <i class="fas fa-edit text-lg"></i> Update Room
            </a>
        </div>

        <div class="px-6 pb-4 space-y-3">
            <p class="text-[10px] uppercase font-bold tracking-widest text-slate-600 mb-2 ml-2">Employees</p>
            <a href="javascript:void(0)" id="menuManageEmployee" class="sidebar-item flex items-center gap-4 p-3.5 rounded-xl text-sm font-semibold">
                <i class="fas fa-users text-lg"></i> Manage Employees
            </a>
            <a href="javascript:void(0)" id="menuRevenue" class="sidebar-item flex items-center gap-4 p-3.5 rounded-xl text-sm font-semibold">
                <i class="fas fa-chart-line text-lg"></i> Revenue Statistics
            </a>
        </div>
        <div class="p-6">
            <button class="sidebar-item w-full flex items-center gap-4 p-3.5 rounded-xl text-sm font-semibold text-red-400 hover:bg-red-500/10">
                <i class="fas fa-sign-out-alt text-lg"></i> Log out
            </button>
        </div>
    </aside>
</th:block>

</body>
</html>
