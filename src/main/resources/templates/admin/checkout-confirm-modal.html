<!-- ===== CHECK OUT CONFIRM MODAL ===== -->
<div id="co-modal-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(15,23,42,0.45);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:24px;padding:32px 36px;width:100%;max-width:420px;box-shadow:0 24px 60px rgba(0,0,0,0.18);animation:coModalIn .18s ease;">
        <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#f59e0b,#d97706);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
            <i class="fas fa-door-closed" style="color:#fff;font-size:22px;"></i>
        </div>
        <h3 style="text-align:center;font-size:18px;font-weight:800;color:#1e293b;margin-bottom:6px;">Xác nhận Check Out</h3>
        <p style="text-align:center;font-size:13px;color:#94a3b8;margin-bottom:24px;">Vui lòng kiểm tra thông tin trước khi xác nhận trả phòng</p>
        <div style="background:#fffbeb;border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:12px;margin-bottom:24px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:12px;color:#94a3b8;font-weight:600;">Phòng</span>
                <span style="font-size:13px;font-weight:800;color:#1e293b;" id="co-modal-room">—</span>
            </div>
            <div style="height:1px;background:#fde68a;"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:12px;color:#94a3b8;font-weight:600;">Booking ID</span>
                <span style="font-size:13px;font-weight:800;color:#f59e0b;" id="co-modal-booking">—</span>
            </div>
            <div style="height:1px;background:#fde68a;"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:12px;color:#94a3b8;font-weight:600;">Khách hàng</span>
                <span style="font-size:13px;font-weight:700;color:#475569;" id="co-modal-customer">—</span>
            </div>
            <div style="height:1px;background:#fde68a;"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:12px;color:#94a3b8;font-weight:600;">Nhân viên</span>
                <span style="font-size:13px;font-weight:700;color:#475569;" id="co-modal-emp">—</span>
            </div>
        </div>
        <div style="display:flex;gap:12px;">
            <button onclick="coCloseConfirm()" style="flex:1;padding:12px;border-radius:12px;border:1.5px solid #e2e8f0;background:#fff;font-size:13px;font-weight:700;color:#64748b;cursor:pointer;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='#fff'">Huỷ bỏ</button>
            <button onclick="coDoCheckOut()" style="flex:1;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#f59e0b,#d97706);font-size:13px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 4px 14px rgba(245,158,11,0.3);" onmouseover="this.style.opacity='.88'" onmouseout="this.style.opacity='1'"><i class="fas fa-door-closed"></i> Xác nhận Check Out</button>
        </div>
    </div>
</div>
<style>
    @keyframes coModalIn { from { transform: scale(.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>

<!-- ===== CHECK IN CONFIRM MODAL ===== -->
<div id="ci-modal-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(15,23,42,0.45);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:24px;padding:32px 36px;width:100%;max-width:420px;box-shadow:0 24px 60px rgba(0,0,0,0.18);animation:ciModalIn .18s ease;">
        <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
            <i class="fas fa-door-open" style="color:#fff;font-size:22px;"></i>
        </div>
        <h3 style="text-align:center;font-size:18px;font-weight:800;color:#1e293b;margin-bottom:6px;">Xac nhan Check In</h3>
        <p style="text-align:center;font-size:13px;color:#94a3b8;margin-bottom:24px;">Vui long kiem tra thong tin truoc khi xac nhan</p>
        <div style="background:#f8fafc;border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:12px;margin-bottom:24px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:12px;color:#94a3b8;font-weight:600;">Phong</span>
                <span style="font-size:13px;font-weight:800;color:#1e293b;" id="ci-modal-room">—</span>
            </div>
            <div style="height:1px;background:#e2e8f0;"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:12px;color:#94a3b8;font-weight:600;">Booking ID</span>
                <span style="font-size:13px;font-weight:800;color:#3b82f6;" id="ci-modal-booking">—</span>
            </div>
            <div style="height:1px;background:#e2e8f0;"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:12px;color:#94a3b8;font-weight:600;">Nhan vien</span>
                <span style="font-size:13px;font-weight:700;color:#475569;" id="ci-modal-emp">—</span>
            </div>
        </div>
        <div style="margin-bottom:24px;">
            <label for="ci-modal-cccd" style="display:block;font-size:12px;color:#94a3b8;font-weight:600;margin-bottom:6px;">So CCCD khach hang</label>
            <input type="text" id="ci-modal-cccd" placeholder="012345678901..." maxlength="12" inputmode="numeric"
                   style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:13px;font-weight:600;color:#1e293b;outline:none;box-sizing:border-box;"
                   onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='#e2e8f0'">
        </div>
        <div style="display:flex;gap:12px;">
            <button onclick="ciCloseConfirm()" style="flex:1;padding:12px;border-radius:12px;border:1.5px solid #e2e8f0;background:#fff;font-size:13px;font-weight:700;color:#64748b;cursor:pointer;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='#fff'">Huy bo</button>
            <button onclick="ciDoCheckIn()" style="flex:1;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#3b82f6,#6366f1);font-size:13px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 4px 14px rgba(99,102,241,0.3);" onmouseover="this.style.opacity='.88'" onmouseout="this.style.opacity='1'"><i class="fas fa-door-open"></i> Xac nhan Check In</button>
        </div>
    </div>
</div>
<style>
    @keyframes ciModalIn { from { transform: scale(.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
