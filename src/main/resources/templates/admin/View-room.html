<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<body>

<th:block th:fragment="content">
    <!-- ===== MAIN: ADD / UPDATE FORM ===== -->
    <main id="view-form" class="flex-1 flex flex-col overflow-y-auto relative" style="display:none;">

        <header class="sticky top-0 z-10 bg-white/80 backdrop-blur-md h-20 border-b border-slate-200 flex items-center justify-between px-10">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Add New Room</h1>
                <p class="text-xs text-slate-500 font-medium">Dashboard / Rooms / Create</p>
            </div>
            <div class="flex items-center gap-6">
                <div class="relative cursor-pointer text-slate-400 hover:text-blue-600 transition-colors" title="Thông báo">
                    <i class="far fa-bell text-xl"></i>
                    <span class="absolute -top-1 -right-1 bg-red-500 w-2 h-2 rounded-full border-2 border-white"></span>
                </div>
                <div class="h-10 w-[1px] bg-slate-200"></div>
                <div class="flex items-center gap-3 bg-slate-50 p-1.5 pr-4 rounded-full border border-slate-100 hover:bg-slate-100 transition-all cursor-pointer" id="rf-user-chip" onclick="rfToggleUserMenu()">
                    <div id="rf-avatar" class="w-9 h-9 rounded-full flex items-center justify-center text-white text-sm font-bold shadow-sm flex-shrink-0"
                         style="background: linear-gradient(135deg, #3b6fd4, #5b8fe8);">??</div>
                    <span class="text-sm font-bold text-slate-700" id="rf-greeting">Hi, ...</span>
                </div>
                <div id="rf-user-menu" class="hidden absolute top-[72px] right-8 z-50 w-52 bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden py-1">
                    <div class="px-4 py-3 border-b border-slate-100">
                        <p class="text-xs text-slate-400 font-medium">Đăng nhập với tư cách</p>
                        <p class="text-sm font-bold text-slate-800 mt-0.5 truncate" id="rf-fullname-menu">—</p>
                        <p class="text-xs text-blue-500 font-semibold mt-0.5" id="rf-role-menu">—</p>
                    </div>
                    <a href="/demo" class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-600 hover:bg-slate-50 transition-colors">
                        <i class="fas fa-home w-4 text-slate-400"></i> Về trang chủ
                    </a>
                    <button onclick="rfLogout()" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-500 hover:bg-red-50 transition-colors">
                        <i class="fas fa-sign-out-alt w-4"></i> Đăng xuất
                    </button>
                </div>
            </div>
        </header>

        <div class="p-10 max-w-5xl mx-auto w-full">
            <div class="glass-card rounded-[2rem] shadow-2xl shadow-slate-200/50 p-10">
                <form id="addRoomForm" enctype="multipart/form-data" class="space-y-8">
                    <input type="hidden" name="id" id="roomId">
                    <div id="searchSection" class="hidden mb-10 pb-8 border-b border-slate-100">
                        <label class="text-[13px] font-bold text-blue-600 uppercase tracking-wider mb-3 block">Tìm kiếm phòng theo ID</label>
                        <div class="flex gap-4">
                            <div class="relative flex-1">
                                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <input type="number" id="inputSearchId" placeholder="Nhập ID phòng..."
                                       class="input-focus w-full pl-14 pr-5 py-4 bg-slate-50/50 border border-slate-200 rounded-2xl outline-none text-slate-700 font-medium">
                            </div>
                            <button type="button" onclick="fetchRoomDetail()" class="px-8 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold transition-all flex items-center gap-2">
                                <i class="fas fa-download"></i> Tải dữ liệu
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="col-span-2">
                            <label class="text-[13px] font-bold text-slate-500 uppercase tracking-wider ml-1 mb-2 block">Room Name</label>
                            <input type="text" name="name" required
                                   class="input-focus w-full px-5 py-4 bg-slate-50/50 border border-slate-200 rounded-2xl outline-none text-slate-700 font-medium placeholder:text-slate-400"
                                   placeholder="e.g. Royal Suite 702">
                        </div>

                        <div class="col-span-2">
                            <label class="text-[13px] font-bold text-slate-500 uppercase tracking-wider ml-1 mb-2 block">
                                <i class="fas fa-map-marker-alt text-blue-400 mr-1"></i> Chi Nhánh Làm Việc
                            </label>
                            <div class="relative">
                                <div class="absolute left-5 top-1/2 -translate-y-1/2 w-8 h-8 bg-blue-50 text-blue-500 rounded-lg flex items-center justify-center pointer-events-none">
                                    <i class="fas fa-building text-sm"></i>
                                </div>
                                <select id="workBranchSelect" name="workBranch" required
                                        class="input-focus w-full pl-16 pr-12 py-4 bg-slate-50/50 border border-slate-200 rounded-2xl outline-none text-slate-700 font-medium appearance-none cursor-pointer">
                                    <option value="">-- Chọn chi nhánh --</option>
                                    <option value="Số 1 đường Nguyễn Chí Thanh, Hà Nội">Số 1 đường Nguyễn Chí Thanh, Hà Nội</option>
                                    <option value="Số 2 Lê Đại Hành, Hà Nội">Số 2 Lê Đại Hành, Hà Nội</option>
                                    <option value="Số 3 đường Lê Lợi, Ninh Bình">Số 3 đường Lê Lợi, Ninh Bình</option>
                                    <option value="Số 4 Trần Quốc Nghiễn, Hạ Long">Số 4 Trần Quốc Nghiễn, Hạ Long</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xs"></i>
                            </div>
                        </div>

                        <div>
                            <label class="text-[13px] font-bold text-slate-500 uppercase tracking-wider ml-1 mb-2 block">Current Status</label>
                            <div class="relative">
                                <select name="status" class="input-focus w-full px-5 py-4 bg-slate-50/50 border border-slate-200 rounded-2xl outline-none text-slate-700 font-medium appearance-none cursor-pointer">
                                    <option value="AVAILABLE">Available</option>
                                    <option value="CURRENTLY_TENANT">Currently Tenant</option>
                                    <option value="MAINTENANCE">Maintenance</option>
                                    <option value="CLEANING">Cleaning</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xs"></i>
                            </div>
                        </div>

                        <div>
                            <label class="text-[13px] font-bold text-slate-500 uppercase tracking-wider ml-1 mb-2 block">Room Category</label>
                            <div class="relative">
                                <select id="roomTypeSelect" name="type_room_id" required
                                        class="input-focus w-full px-5 py-4 bg-slate-50/50 border border-slate-200 rounded-2xl outline-none text-slate-700 font-medium appearance-none cursor-pointer">
                                    <option value="">Đang tải danh sách...</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xs"></i>
                            </div>
                        </div>

                    </div>

                    <div class="flex items-center justify-end gap-5 pt-10">
                        <button type="reset" id="btnReset" onclick="clearPreview()"
                                class="px-8 py-4 rounded-2xl font-bold text-slate-500 hover:bg-slate-100 transition-all uppercase text-xs tracking-widest">
                            Reset Form
                        </button>
                        <button type="button" id="btnDelete" onclick="handleDelete()"
                                class="hidden px-10 py-4 bg-red-50 text-red-600 hover:bg-red-600 hover:text-white rounded-2xl font-bold transition-all uppercase text-xs tracking-widest flex items-center gap-3">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                        <button type="submit" id="btnSubmit"
                                class="px-10 py-4 bg-slate-900 hover:bg-blue-600 text-white rounded-2xl font-bold shadow-xl shadow-slate-200 transition-all active:scale-95 uppercase text-xs tracking-widest flex items-center gap-3">
                            <span id="submitText">Save Room</span>
                            <i id="submitIcon" class="fas fa-arrow-right text-[10px]"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</th:block>

</body>
</html>
