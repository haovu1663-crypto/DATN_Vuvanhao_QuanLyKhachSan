<!-- ===== VIEW MANAGE EMPLOYEES ===== -->
<main id="view-manage-employee" class="flex-1 flex-col overflow-y-auto relative" style="display:none;">
    <header class="sticky top-0 z-10 bg-white/80 backdrop-blur-md h-20 border-b border-slate-200 flex items-center justify-between px-10">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">Quản lý nhân viên</h1>
            <p class="text-xs text-slate-500 font-medium">Dashboard / Employees / Manage</p>
        </div>
        <div class="flex items-center gap-3">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input id="emp-search-input" type="text" placeholder="Tìm theo tên..."
                       oninput="empSearchFilter()"
                       class="pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 outline-none focus:border-blue-400 focus:bg-white transition-all w-56">
            </div>
            <!-- Combobox lọc chi nhánh -->
            <div class="relative">
                <i class="fas fa-map-marker-alt absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none"></i>
                <select id="emp-branch-filter" onchange="empBranchFilter()"
                        class="pl-9 pr-8 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 outline-none focus:border-blue-400 focus:bg-white transition-all appearance-none cursor-pointer font-medium">
                    <option value="">Tất cả chi nhánh</option>
                    <option value="Số 1 đường Nguyễn Chí Thanh, Hà Nội">Số 1 - Nguyễn Chí Thanh, HN</option>
                    <option value="Số 2 Lê Đại Hành, Hà Nội">Số 2 - Lê Đại Hành, HN</option>
                    <option value="Số 3 đường Lê Lợi, Ninh Bình">Số 3 - Lê Lợi, Ninh Bình</option>
                    <option value="Số 4 Trần Quốc Nghiễn, Hạ Long">Số 4 - Trần Quốc Nghiễn, HN</option>
                </select>
                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
            </div>
            <button onclick="switchToView('add-employee')"
                    class="flex items-center gap-2 px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold text-sm transition-all">
                <i class="fas fa-user-plus"></i> Add Employee
            </button>
        </div>
    </header>

    <div class="p-8 w-full">
        <!-- STATS ROW -->
        <div class="grid grid-cols-3 gap-5 mb-8">
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600 text-xl"><i class="fas fa-users"></i></div>
                <div>
                    <p class="text-xs text-slate-400 font-semibold uppercase tracking-wide">Tổng nhân viên</p>
                    <p class="text-2xl font-bold text-slate-800" id="emp-stat-total">—</p>
                </div>
            </div>
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="w-12 h-12 bg-amber-50 rounded-xl flex items-center justify-center text-amber-500 text-xl"><i class="fas fa-concierge-bell"></i></div>
                <div>
                    <p class="text-xs text-slate-400 font-semibold uppercase tracking-wide">Lễ tân</p>
                    <p class="text-2xl font-bold text-slate-800" id="emp-stat-receptionist">—</p>
                </div>
            </div>
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="w-12 h-12 bg-green-50 rounded-xl flex items-center justify-center text-green-600 text-xl"><i class="fas fa-broom"></i></div>
                <div>
                    <p class="text-xs text-slate-400 font-semibold uppercase tracking-wide">Dọn phòng</p>
                    <p class="text-2xl font-bold text-slate-800" id="emp-stat-cleaning">—</p>
                </div>
            </div>
        </div>

        <!-- TABLE -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-sm">
                <thead>
                <tr class="bg-slate-50 border-b border-slate-100">
                    <th class="text-left px-6 py-4 text-[11px] font-bold uppercase tracking-widest text-slate-400">ID</th>
                    <th class="text-left px-6 py-4 text-[11px] font-bold uppercase tracking-widest text-slate-400">Họ và tên</th>
                    <th class="text-left px-6 py-4 text-[11px] font-bold uppercase tracking-widest text-slate-400">Chức vụ</th>
                    <th class="text-left px-6 py-4 text-[11px] font-bold uppercase tracking-widest text-slate-400">Số điện thoại</th>
                    <th class="text-right px-6 py-4 text-[11px] font-bold uppercase tracking-widest text-slate-400">Lương (VNĐ)</th>
                    <th class="text-center px-6 py-4 text-[11px] font-bold uppercase tracking-widest text-slate-400">Thao tác</th>
                </tr>
                </thead>
                <tbody id="emp-table-body">
                <tr>
                    <td colspan="6" class="text-center py-16 text-slate-400">
                        <i class="fas fa-spinner fa-spin text-2xl mb-3 block"></i>
                        Đang tải danh sách...
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- EMPTY STATE (ẩn mặc định) -->
        <div id="emp-empty-state" class="hidden text-center py-20">
            <div class="text-6xl mb-4">👥</div>
            <p class="text-slate-500 font-semibold text-lg">Chưa có nhân viên nào</p>
            <p class="text-slate-400 text-sm mt-1">Bấm "Add Employee" để thêm nhân viên mới</p>
        </div>
    </div>
</main>
