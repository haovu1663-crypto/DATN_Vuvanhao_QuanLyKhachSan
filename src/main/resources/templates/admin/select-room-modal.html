<!-- ===== MODAL CHỌN PHÒNG (BOOKING OFF) ===== -->
<div id="bk-room-picker-overlay"
     onclick="if(event.target===this)bkHidePicker()"
     style="display:none;position:fixed;inset:0;z-index:9999;
            background:rgba(15,23,42,0.5);backdrop-filter:blur(4px);
            align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:24px;width:95%;max-width:520px;
                max-height:88vh;overflow:hidden;display:flex;flex-direction:column;
                box-shadow:0 24px 60px rgba(0,0,0,0.2);animation:bkPickerIn .18s ease;">
        <!-- Banner -->
        <div style="background:linear-gradient(135deg,#1e3a8a,#2563eb);
                    padding:22px 24px 18px;position:relative;flex-shrink:0;">
            <button onclick="bkHidePicker()"
                    style="position:absolute;top:14px;right:16px;
                           background:rgba(255,255,255,0.15);border:none;color:#fff;
                           width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;
                           display:flex;align-items:center;justify-content:center;">✕</button>
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
                <div style="width:36px;height:36px;border-radius:10px;
                            background:rgba(255,255,255,0.15);
                            display:flex;align-items:center;justify-content:center;">
                    <i class="fas fa-bed" style="color:#fff;font-size:16px;"></i>
                </div>
                <h2 id="bk-room-picker-title"
                    style="color:#fff;font-size:18px;font-weight:800;margin:0;"></h2>
            </div>
            <p id="bk-room-picker-subtitle"
               style="color:rgba(255,255,255,0.72);font-size:12px;margin:0;"></p>
        </div>
        <!-- List -->
        <div style="padding:16px 20px;overflow-y:auto;flex:1;">
            <div id="bk-room-picker-list" style="display:flex;flex-direction:column;gap:10px;min-height:80px;"></div>
        </div>
    </div>
</div>
<style>
    @keyframes bkPickerIn { from { transform:scale(.93);opacity:0; } to { transform:scale(1);opacity:1; } }
</style>
