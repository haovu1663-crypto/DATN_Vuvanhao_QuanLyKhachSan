</section>
<script>
    (function(){
        const track = document.getElementById('destTrack');
        const cards = Array.from(track.querySelectorAll('.dest-card'));
        const VISIBLE = 5;
        let cur = 0;
        function cardW(){ return cards[0].getBoundingClientRect().width + 16; }
        function update(){
            const max = cards.length - VISIBLE;
            cur = Math.max(0, Math.min(cur, max));
            track.style.transform = 'translateX(-' + (cur * cardW()) + 'px)';
            document.getElementById('destPrev').style.opacity = cur === 0 ? '0.3' : '1';
            document.getElementById('destNext').style.opacity = cur >= max ? '0.3' : '1';
        }
        window.slideDestCarousel = function(d){ cur += d; update(); };
        window.selectDest = function(name){
            const el = document.getElementById('destVal');
            if(el){ el.textContent = name; el.classList.remove('placeholder'); }
        };
        update();
    })();
</script>
