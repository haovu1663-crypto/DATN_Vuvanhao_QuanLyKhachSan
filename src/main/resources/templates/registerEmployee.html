<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm nhân viên – StayViet</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy:      #1a2744;
            --gold:      #c9a84c;
            --gold-light:#f0d080;
            --cream:     #faf8f4;
            --white:     #ffffff;
            --gray:      #8a8fa8;
            --border:    #e8e4dc;
            --blue:      #2563eb;
            --blue-dark: #1d4ed8;
            --green:     #16a34a;
            --red:       #dc2626;
            --shadow:    0 8px 40px rgba(26,39,68,0.13);
            --radius:    16px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .form-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 580px;
            overflow: hidden;
        }

        .form-banner {
            background: var(--navy);
            padding: 28px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .banner-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .banner-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 20px; font-weight: 700;
            color: var(--white); margin-bottom: 3px;
        }
        .banner-text p { font-size: 13px; color: rgba(255,255,255,0.6); }

        .form-body {
            padding: 28px 32px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .field { display: flex; flex-direction: column; gap: 7px; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        label {
            font-size: 12px; font-weight: 600;
            letter-spacing: 0.6px; text-transform: uppercase; color: var(--gray);
        }
        label .req { color: var(--red); margin-left: 3px; }

        .input-wrap { position: relative; }
        .input-icon {
            position: absolute; left: 13px; top: 50%;
            transform: translateY(-50%); font-size: 16px; pointer-events: none;
        }
        .form-input, .form-select {
            width: 100%; height: 44px; padding: 0 14px 0 40px;
            border: 1.5px solid var(--border); border-radius: 12px;
            font-family: 'DM Sans', sans-serif; font-size: 14px;
            color: var(--navy); background: #fafafa; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .form-input:focus, .form-select:focus {
            border-color: var(--blue); background: var(--white);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .form-input.error, .form-select.error {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(220,38,38,0.1);
        }
        .form-input.valid {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(22,163,74,0.1);
        }
        .form-input::placeholder { color: #bbb; }

        .form-select { appearance: none; cursor: pointer; padding-right: 36px; }
        .select-arrow {
            position: absolute; right: 13px; top: 50%;
            transform: translateY(-50%); pointer-events: none;
            font-size: 13px; color: var(--gray);
        }

        .pw-toggle {
            position: absolute; right: 13px; top: 50%;
            transform: translateY(-50%); background: none; border: none;
            cursor: pointer; font-size: 16px; color: var(--gray); padding: 0; line-height: 1;
        }
        .pw-toggle:hover { color: var(--navy); }

        .pw-strength { display: flex; gap: 4px; margin-top: 6px; }
        .pw-bar {
            flex: 1; height: 3px; border-radius: 2px;
            background: var(--border); transition: background 0.3s;
        }
        .pw-hint { font-size: 11px; color: var(--gray); margin-top: 4px; }

        /* ===== EMAIL ROW ===== */
        .email-wrap { display: flex; gap: 8px; align-items: center; }
        .email-wrap .input-wrap { flex: 1; }

        .btn-send-code {
            flex-shrink: 0; height: 44px; padding: 0 14px;
            border-radius: 12px; border: 1.5px solid var(--blue);
            background: transparent; font-family: 'DM Sans', sans-serif;
            font-size: 12px; font-weight: 600; color: var(--blue);
            cursor: pointer; white-space: nowrap; transition: all 0.2s;
        }
        .btn-send-code:hover:not(:disabled) { background: var(--blue); color: var(--white); }
        .btn-send-code:disabled { border-color: var(--border); color: var(--gray); cursor: not-allowed; }
        .btn-send-code.counting { border-color: var(--gold); color: var(--gold); }

        /* ===== OTP BOX ===== */
        .otp-box {
            display: none;
            flex-direction: column;
            gap: 7px;
            background: #f0fdf4;
            border: 1.5px solid #bbf7d0;
            border-radius: 12px;
            padding: 14px 16px;
            animation: slideDown 0.25s ease;
        }
        .otp-box.show { display: flex; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .otp-box label { color: var(--green); }
        .otp-row { display: flex; gap: 8px; align-items: center; }
        .otp-row .input-wrap { flex: 1; }
        .otp-status {
            font-size: 12px; font-weight: 600; margin-top: 2px;
            min-height: 16px;
        }
        .otp-status.ok  { color: var(--green); }
        .otp-status.err { color: var(--red); }

        .btn-otp-verify {
            flex-shrink: 0; height: 44px; padding: 0 14px;
            border-radius: 12px; border: none;
            background: var(--green); color: var(--white);
            font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
            cursor: pointer; white-space: nowrap; transition: all 0.2s;
        }
        .btn-otp-verify:hover:not(:disabled) { background: #15803d; }
        .btn-otp-verify:disabled { background: #ccc; cursor: not-allowed; }

        /* ===== DEPT BADGE ===== */
        .dept-badge { display: none; margin-top: 5px; }
        .dept-badge.show { display: block; }
        .dept-badge span {
            display: inline-block; font-size: 11px; font-weight: 600;
            padding: 3px 12px; border-radius: 20px;
        }
        .badge-RECEPTIONIST   { background: #dbeafe; color: #1d4ed8; }
        .badge-CLEANING_STAFF { background: #dcfce7; color: #15803d; }

        .field-hint { font-size: 11px; color: var(--gray); }

        .form-divider { border: none; border-top: 1px solid var(--border); }

        .form-footer {
            padding: 20px 32px 28px;
            display: flex; justify-content: flex-end; gap: 12px;
        }
        .btn-cancel {
            height: 44px; padding: 0 20px; border-radius: 12px;
            border: 1.5px solid var(--border); background: transparent;
            font-family: 'DM Sans', sans-serif; font-size: 14px;
            font-weight: 500; color: var(--gray); cursor: pointer; transition: all 0.2s;
        }
        .btn-cancel:hover { background: #f5f3ef; border-color: #c0bcb4; color: var(--navy); }

        .btn-submit {
            height: 44px; padding: 0 28px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--navy), #2d4a8a);
            font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700;
            color: var(--white); cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-submit:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(26,39,68,0.35);
        }
        .btn-submit:active { transform: none; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

        @media (max-width: 520px) {
            .form-body   { padding: 20px; }
            .form-banner { padding: 20px; }
            .form-footer { padding: 16px 20px 24px; }
            .field-row   { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="form-card">

    <div class="form-banner">
        <div class="banner-icon">👔</div>
        <div class="banner-text">
            <h1>Thêm nhân viên mới</h1>
            <p>Điền đầy đủ thông tin để tạo tài khoản nhân viên</p>
        </div>
    </div>

    <div class="form-body">

        <!-- Họ và tên -->
        <div class="field">
            <label for="emp-name">Họ và tên <span class="req">*</span></label>
            <div class="input-wrap">
                <span class="input-icon">👤</span>
                <input class="form-input" id="emp-name" name="name"
                       type="text" placeholder="Nguyễn Văn A" autocomplete="name">
            </div>
        </div>

        <!-- Chức vụ -->
        <div class="field">
            <label for="emp-department">Chức vụ <span class="req">*</span></label>
            <div class="input-wrap">
                <span class="input-icon">🏷️</span>
                <select class="form-select" id="emp-department" name="department"
                        onchange="updateDeptBadge(this)">
                    <option value="" disabled selected>Chọn chức vụ...</option>
                    <option value="RECEPTIONIST">Lễ tân (Receptionist)</option>
                    <option value="CLEANING_STAFF">Nhân viên dọn phòng (Cleaning Staff)</option>
                </select>
                <span class="select-arrow">▾</span>
            </div>
            <div class="dept-badge" id="dept-badge">
                <span id="dept-badge-text"></span>
            </div>
        </div>

        <!-- Địa điểm làm việc -->
        <div class="field">
            <label for="emp-location">Địa điểm làm việc <span class="req">*</span></label>
            <div class="input-wrap">
                <span class="input-icon">📍</span>
                <select class="form-select" id="emp-location" name="location">
                    <option value="" disabled selected>Chọn địa điểm làm việc...</option>
                    <option value="Nguyễn Chí Thanh">Số 1 đường Nguyễn Chí Thanh Hà Nội</option>
                    <option value="Lê Đại Hành">Số 2 Lê Đại Hành Hà Nội</option>
                    <option value="Lê Lợi">Số 3 đường Lê Lợi Ninh Bình</option>
                    <option value="Trần Quốc Nghiễn">Số 4 Trần Quốc Nghiễn Hạ Long</option>
                </select>
                <span class="select-arrow">▾</span>
            </div>
        </div>

        <hr class="form-divider">

        <!-- Email + nút gửi mã -->
        <div class="field">
            <label for="emp-email">Email <span class="req">*</span></label>
            <div class="email-wrap">
                <div class="input-wrap">
                    <span class="input-icon">✉️</span>
                    <input class="form-input" id="emp-email" name="email"
                           type="email" placeholder="nhanvien@stayviet.vn" autocomplete="email">
                </div>
                <button class="btn-send-code" type="button" id="btn-send-code" onclick="sendVerifyCode()">
                    📨 Gửi mã
                </button>
            </div>
        </div>

        <!-- OTP box (ẩn cho tới khi gửi mã thành công) -->
        <div class="otp-box" id="otp-box">
            <label>🔐 Nhập mã xác nhận đã gửi đến email</label>
            <div class="otp-row">
                <div class="input-wrap">
                    <span class="input-icon">🔑</span>
                    <input class="form-input" id="emp-otp" type="text"
                           placeholder="Nhập mã 4 chữ số" maxlength="4"
                           oninput="onOtpInput(this)">
                </div>
                <button class="btn-otp-verify" type="button" id="btn-otp-verify" onclick="verifyOtp()">
                    Xác nhận
                </button>
            </div>
            <span class="otp-status" id="otp-status"></span>
        </div>

        <!-- Số điện thoại -->
        <div class="field">
            <label for="emp-phone">Số điện thoại <span class="req">*</span></label>
            <div class="input-wrap">
                <span class="input-icon">📱</span>
                <input class="form-input" id="emp-phone" name="phone"
                       type="tel" placeholder="0912 345 678" maxlength="11">
            </div>
        </div>

        <hr class="form-divider">

        <!-- Username + Password -->
        <div class="field-row">
            <div class="field">
                <label for="emp-username">Tên đăng nhập <span class="req">*</span></label>
                <div class="input-wrap">
                    <span class="input-icon">🔖</span>
                    <input class="form-input" id="emp-username" name="userName"
                           type="text" placeholder="nguyenvana" autocomplete="username">
                </div>
                <span class="field-hint">Chữ thường, số và dấu gạch dưới</span>
            </div>
            <div class="field">
                <label for="emp-password">Mật khẩu <span class="req">*</span></label>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input class="form-input" id="emp-password" name="password"
                           type="password" placeholder="Tối thiểu 8 ký tự"
                           autocomplete="new-password" oninput="checkPasswordStrength(this.value)">
                    <button class="pw-toggle" type="button" onclick="togglePassword()"
                            id="pw-toggle-btn" title="Hiện/ẩn mật khẩu">👁️</button>
                </div>
                <div class="pw-strength">
                    <div class="pw-bar" id="pw-bar-0"></div>
                    <div class="pw-bar" id="pw-bar-1"></div>
                    <div class="pw-bar" id="pw-bar-2"></div>
                    <div class="pw-bar" id="pw-bar-3"></div>
                </div>
                <span class="pw-hint" id="pw-hint">Nhập mật khẩu để xem độ mạnh</span>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <div class="form-footer">
        <button class="btn-cancel" type="button" onclick="resetForm()">Hủy</button>
        <button class="btn-submit" type="button" id="btn-submit" onclick="submitEmployee()" disabled>
            🔒&nbsp; Tạo nhân viên
        </button>
    </div>

</div>

<script>
    /* ============================================================
       STATE
    ============================================================ */
    let otpFromServer   = null;   // mã OTP trả về từ API
    let otpVerified     = false;  // đã xác nhận đúng OTP chưa
    let countdownTimer  = null;

    /* ============================================================
       GỬI MÃ OTP  →  POST /api/email/register/employee?email=...
    ============================================================ */
    function sendVerifyCode() {
        const emailInput = document.getElementById('emp-email');
        const btn        = document.getElementById('btn-send-code');
        const email      = emailInput.value.trim();

        // Validate email
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            emailInput.classList.add('error');
            Swal.fire({
                icon: 'warning',
                title: 'Email không hợp lệ',
                text: 'Vui lòng nhập đúng định dạng email trước khi gửi mã.',
                confirmButtonColor: '#1a2744'
            });
            return;
        }

        emailInput.classList.remove('error');
        btn.disabled = true;
        btn.textContent = '⏳ Đang gửi...';

        // Reset trạng thái OTP cũ
        otpFromServer = null;
        otpVerified   = false;
        setSubmitLocked(true);
        document.getElementById('otp-box').classList.remove('show');
        document.getElementById('emp-otp').value = '';
        document.getElementById('emp-otp').classList.remove('valid', 'error');
        document.getElementById('otp-status').textContent = '';
        document.getElementById('otp-status').className   = 'otp-status';

        fetch(`/api/email/register/employee?email=${encodeURIComponent(email)}`, {
            method: 'POST'
        })
            .then(async res => {
                if (!res.ok) {
                    const msg = await res.text();
                    throw new Error(msg || 'Không thể gửi mã, vui lòng thử lại.');
                }
                return res.json(); // server trả về số OTP (integer)
            })
            .then(otp => {
                otpFromServer = String(otp);

                // Hiện ô nhập OTP
                document.getElementById('otp-box').classList.add('show');

                Swal.fire({
                    icon: 'success',
                    title: 'Đã gửi mã xác nhận!',
                    text: `Vui lòng kiểm tra hộp thư của ${email}`,
                    confirmButtonColor: '#1a2744',
                    timer: 3000,
                    timerProgressBar: true
                });

                // Đếm ngược 60 giây
                startCountdown(btn);
            })
            .catch(err => {
                btn.disabled = false;
                btn.textContent = '📨 Gửi mã';
                Swal.fire({
                    icon: 'error',
                    title: 'Gửi mã thất bại',
                    text: err.message,
                    confirmButtonColor: '#dc2626'
                });
            });
    }

    function startCountdown(btn) {
        let seconds = 60;
        btn.classList.add('counting');
        btn.textContent = `⏳ ${seconds}s`;
        clearInterval(countdownTimer);
        countdownTimer = setInterval(() => {
            seconds--;
            btn.textContent = `⏳ ${seconds}s`;
            if (seconds <= 0) {
                clearInterval(countdownTimer);
                btn.disabled = false;
                btn.classList.remove('counting');
                btn.textContent = '📨 Gửi lại mã';
            }
        }, 1000);
    }

    /* ============================================================
       XÁC NHẬN OTP
    ============================================================ */
    function onOtpInput(input) {
        // Chỉ cho nhập số
        input.value = input.value.replace(/\D/g, '');

        // Reset trạng thái nếu người dùng sửa lại
        if (otpVerified) {
            otpVerified = false;
            setSubmitLocked(true);
            input.classList.remove('valid');
            document.getElementById('otp-status').textContent = '';
            document.getElementById('otp-status').className   = 'otp-status';
        }
    }

    function verifyOtp() {
        const input     = document.getElementById('emp-otp');
        const statusEl  = document.getElementById('otp-status');
        const entered   = input.value.trim();

        if (!otpFromServer) {
            statusEl.textContent = '⚠️ Vui lòng gửi mã trước.';
            statusEl.className   = 'otp-status err';
            return;
        }

        if (entered === otpFromServer) {
            // ✅ Đúng
            otpVerified = true;
            input.classList.remove('error');
            input.classList.add('valid');
            statusEl.textContent = '✅ Xác nhận thành công! Bạn có thể tạo nhân viên.';
            statusEl.className   = 'otp-status ok';
            document.getElementById('btn-otp-verify').disabled = true;
            setSubmitLocked(false);
        } else {
            // ❌ Sai
            otpVerified = false;
            input.classList.remove('valid');
            input.classList.add('error');
            statusEl.textContent = '❌ Mã không đúng, vui lòng kiểm tra lại.';
            statusEl.className   = 'otp-status err';
            setSubmitLocked(true);

            // Rung input
            input.animate([
                { transform: 'translateX(-6px)' },
                { transform: 'translateX(6px)' },
                { transform: 'translateX(-4px)' },
                { transform: 'translateX(4px)' },
                { transform: 'translateX(0)' }
            ], { duration: 300 });
        }
    }

    function setSubmitLocked(locked) {
        const btn = document.getElementById('btn-submit');
        btn.disabled = locked;
        btn.innerHTML = locked
            ? '🔒&nbsp; Tạo nhân viên'
            : '✅&nbsp; Tạo nhân viên';
    }

    /* ============================================================
       DEPARTMENT BADGE
    ============================================================ */
    const DEPT_INFO = {
        RECEPTIONIST:   { text: '🛎️ Lễ tân',              cls: 'badge-RECEPTIONIST' },
        CLEANING_STAFF: { text: '🧹 Nhân viên dọn phòng', cls: 'badge-CLEANING_STAFF' }
    };

    function updateDeptBadge(sel) {
        const badge     = document.getElementById('dept-badge');
        const badgeText = document.getElementById('dept-badge-text');
        const val = sel.value;
        if (!val) { badge.classList.remove('show'); return; }
        const info = DEPT_INFO[val];
        badgeText.textContent = info.text;
        badgeText.className   = info.cls;
        badge.classList.add('show');
    }

    /* ============================================================
       PASSWORD STRENGTH
    ============================================================ */
    function checkPasswordStrength(pw) {
        const bars   = [0,1,2,3].map(i => document.getElementById('pw-bar-' + i));
        const hint   = document.getElementById('pw-hint');
        const colors = ['#dc2626','#f97316','#eab308','#16a34a'];
        const labels = ['Rất yếu','Yếu','Trung bình','Mạnh'];
        let score = 0;
        if (pw.length >= 8)          score++;
        if (/[A-Z]/.test(pw))        score++;
        if (/[0-9]/.test(pw))        score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;
        bars.forEach((bar, i) => {
            bar.style.background = i < score ? colors[score - 1] : 'var(--border)';
        });
        hint.textContent = pw.length === 0 ? 'Nhập mật khẩu để xem độ mạnh' : (labels[score - 1] || 'Rất yếu');
        hint.style.color = pw.length === 0 ? 'var(--gray)' : (colors[score - 1] || colors[0]);
    }

    /* ============================================================
       TOGGLE PASSWORD
    ============================================================ */
    function togglePassword() {
        const input = document.getElementById('emp-password');
        const btn   = document.getElementById('pw-toggle-btn');
        if (input.type === 'password') { input.type = 'text';     btn.textContent = '🙈'; }
        else                           { input.type = 'password'; btn.textContent = '👁️'; }
    }

    /* ============================================================
       VALIDATION
    ============================================================ */
    function validate() {
        const fields = [
            { id: 'emp-name',       label: 'Họ và tên',         check: v => v.length > 0 },
            { id: 'emp-department', label: 'Chức vụ',            check: v => v !== '' },
            { id: 'emp-location',   label: 'Địa điểm làm việc',  check: v => v !== '' },
            { id: 'emp-email',      label: 'Email',              check: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) },
            { id: 'emp-phone',      label: 'Số điện thoại',      check: v => /^0\d{9,10}$/.test(v) },
            { id: 'emp-username',   label: 'Tên đăng nhập',      check: v => /^[a-z0-9_]{3,}$/.test(v) },
            { id: 'emp-password',   label: 'Mật khẩu',           check: v => v.length >= 8 }
        ];
        let errors = [];
        fields.forEach(f => {
            const el  = document.getElementById(f.id);
            const val = el.value.trim();
            if (!f.check(val)) { el.classList.add('error'); errors.push(f.label); }
            else                { el.classList.remove('error'); }
        });
        return errors;
    }

    /* ============================================================
       RESET
    ============================================================ */
    function resetForm() {
        ['emp-name','emp-email','emp-phone','emp-username','emp-password','emp-otp'].forEach(id => {
            const el = document.getElementById(id);
            if (el) { el.value = ''; el.classList.remove('error','valid'); }
        });
        document.getElementById('emp-department').value = '';
        document.getElementById('emp-department').classList.remove('error');
        document.getElementById('emp-location').value = '';
        document.getElementById('emp-location').classList.remove('error');
        document.getElementById('dept-badge').classList.remove('show');
        document.getElementById('otp-box').classList.remove('show');
        document.getElementById('otp-status').textContent = '';
        document.getElementById('otp-status').className   = 'otp-status';
        document.getElementById('btn-otp-verify').disabled = false;
        checkPasswordStrength('');
        otpFromServer = null;
        otpVerified   = false;
        setSubmitLocked(true);
    }

    /* ============================================================
       SUBMIT  →  POST /api/v1/employees/register  (multipart/form-data)
    ============================================================ */
    function submitEmployee() {
        // Chặn nếu OTP chưa xác nhận (bảo vệ 2 lớp)
        if (!otpVerified) {
            Swal.fire({
                icon: 'warning',
                title: 'Chưa xác nhận email',
                text: 'Vui lòng gửi mã và xác nhận OTP trước khi tạo nhân viên.',
                confirmButtonColor: '#1a2744'
            });
            return;
        }

        const errors = validate();
        if (errors.length > 0) {
            Swal.fire({
                icon: 'warning',
                title: 'Vui lòng kiểm tra lại',
                html: 'Các trường chưa hợp lệ:<br><b>' + errors.join(', ') + '</b>',
                confirmButtonColor: '#1a2744'
            });
            return;
        }

        // Đóng gói FormData (backend dùng @ModelAttribute)
        const formData = new FormData();
        formData.append('name',       document.getElementById('emp-name').value.trim());
        formData.append('department', document.getElementById('emp-department').value);
        formData.append('workBranch', document.getElementById('emp-location').value);
        formData.append('email',      document.getElementById('emp-email').value.trim());
        formData.append('phone',      document.getElementById('emp-phone').value.trim());
        formData.append('userName',   document.getElementById('emp-username').value.trim());
        formData.append('password',   document.getElementById('emp-password').value);
        // salary mặc định 6.500.000 (đủ min constraint), có thể thêm field sau
        formData.append('salary',     '6500000');

        const btn = document.getElementById('btn-submit');
        btn.disabled    = true;
        btn.innerHTML   = '⏳&nbsp; Đang xử lý...';

        fetch('/api/v1/employees/register', {
            method: 'POST',
            body: formData          // multipart/form-data, khớp @ModelAttribute
        })
            .then(async res => {
                if (!res.ok) throw new Error(await res.text());
                return res.json();
            })
            .then(data => {
                Swal.fire({
                    icon: 'success',
                    title: 'Tạo nhân viên thành công! 🎉',
                    text: 'Tài khoản của ' + document.getElementById('emp-name').value.trim() + ' đã được tạo.',
                    confirmButtonColor: '#1a2744'
                }).then(() => resetForm());
            })
            .catch(err => {
                Swal.fire({
                    icon: 'error',
                    title: 'Tạo thất bại',
                    text: err.message || 'Có lỗi xảy ra, vui lòng thử lại.',
                    confirmButtonColor: '#dc2626'
                });
                setSubmitLocked(false);
            });
    }

    /* Xóa class error khi người dùng sửa */
    document.querySelectorAll('.form-input, .form-select').forEach(el => {
        el.addEventListener('input',  () => el.classList.remove('error'));
        el.addEventListener('change', () => el.classList.remove('error'));
    });
</script>

</body>
