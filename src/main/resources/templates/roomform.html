<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Khách Sạn | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.01em;
        }

        /* Tinh chỉnh Sidebar */
        .sidebar-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .sidebar-item:hover {
            background: rgba(59, 130, 246, 0.1);
            color: #eff6ff;
            transform: translateX(4px);
        }
        .active-menu {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%) !important;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            color: white !important;
        }

        /* Hiệu ứng Glassmorphism nhẹ cho Form */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        /* Tinh chỉnh input */
        .input-focus {
            transition: all 0.2s ease;
        }
        .input-focus:focus {
            background: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
        }

        /* Hiệu ứng ảnh preview */
        .preview-card {
            transition: all 0.3s ease;
        }
        .preview-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-[#f8fafc] flex h-screen overflow-hidden text-slate-900">

<aside class="w-72 bg-slate-950 text-slate-400 flex flex-col shadow-2xl z-20">
    <div class="p-8 border-b border-slate-900">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-500/20">
                <i class="fas fa-hotel text-white text-xl"></i>
            </div>
            <span class="text-white text-xl font-bold tracking-tight">GrandHotel</span>
        </div>
    </div>

    <nav class="flex-1 mt-8 px-6 space-y-3">
        <p class="text-[10px] uppercase font-bold tracking-widest text-slate-600 mb-4 ml-2">Main Menu</p>
        <a href="javascript:void(0)" id="menuAdd" class="sidebar-item active-menu flex items-center gap-4 p-3.5 rounded-xl text-sm font-semibold">
            <i class="fas fa-plus-circle text-lg"></i> Add Room
        </a>
        <a href="javascript:void(0)" id="menuUpdate" class="sidebar-item flex items-center gap-4 p-3.5 rounded-xl text-sm font-semibold">
            <i class="fas fa-edit text-lg"></i> Update Room
        </a>
        <a href="#" class="sidebar-item flex items-center gap-4 p-3.5 rounded-xl text-sm font-semibold">
            <i class="fas fa-sync-alt text-lg"></i> Reset Status
        </a>
        <a href="#" class="sidebar-item flex items-center gap-4 p-3.5 rounded-xl text-sm font-semibold">
            <i class="fas fa-calendar-check text-lg"></i> Booking Room
        </a>
    </nav>

    <div class="p-6">
        <button class="sidebar-item w-full flex items-center gap-4 p-3.5 rounded-xl text-sm font-semibold text-red-400 hover:bg-red-500/10">
            <i class="fas fa-sign-out-alt text-lg"></i> Log out
        </button>
    </div>
</aside>

<main class="flex-1 flex flex-col overflow-y-auto relative">

    <header class="sticky top-0 z-10 bg-white/80 backdrop-blur-md h-20 border-b border-slate-200 flex items-center justify-between px-10">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">Add New Room</h1>
            <p class="text-xs text-slate-500 font-medium">Dashboard / Rooms / Create</p>
        </div>
        <div class="flex items-center gap-6">
            <div class="relative cursor-pointer text-slate-400 hover:text-blue-600 transition-colors">
                <i class="far fa-bell text-xl"></i>
                <span class="absolute -top-1 -right-1 bg-red-500 w-2 h-2 rounded-full border-2 border-white"></span>
            </div>
            <div class="h-10 w-[1px] bg-slate-200"></div>
            <div class="flex items-center gap-3 bg-slate-50 p-1.5 pr-4 rounded-full border border-slate-100 hover:bg-slate-100 transition-all cursor-pointer">
                <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" class="w-8 h-8 rounded-full shadow-sm">
                <span class="text-sm font-bold text-slate-700">Hi, Hien!</span>
            </div>
        </div>
    </header>

    <div class="p-10 max-w-5xl mx-auto w-full">
        <div class="glass-card rounded-[2rem] shadow-2xl shadow-slate-200/50 p-10">
            <form id="addRoomForm" enctype="multipart/form-data" class="space-y-8">
                <!-- nút search -->
                <input type="hidden" name="id" id="roomId">
                <div id="searchSection" class="hidden mb-10 pb-8 border-b border-slate-100">
                    <label class="text-[13px] font-bold text-blue-600 uppercase tracking-wider mb-3 block">Tìm kiếm phòng theo ID</label>
                    <div class="flex gap-4">
                        <div class="relative flex-1">
                            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="number" id="inputSearchId" placeholder="Nhập ID phòng..."
                                   class="input-focus w-full pl-14 pr-5 py-4 bg-slate-50/50 border border-slate-200 rounded-2xl outline-none text-slate-700 font-medium">
                        </div>
                        <button type="button" onclick="fetchRoomDetail()" class="px-8 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold transition-all flex items-center gap-2">
                            <i class="fas fa-download"></i> Tải dữ liệu
                        </button>
                    </div>
                </div>
                <!-- form add room -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="col-span-2">
                        <label class="text-[13px] font-bold text-slate-500 uppercase tracking-wider ml-1 mb-2 block">Room Name</label>
                        <input type="text" name="name" required
                               class="input-focus w-full px-5 py-4 bg-slate-50/50 border border-slate-200 rounded-2xl outline-none text-slate-700 font-medium placeholder:text-slate-400"
                               placeholder="e.g. Royal Suite 702">
                    </div>

                    <div>
                        <label class="text-[13px] font-bold text-slate-500 uppercase tracking-wider ml-1 mb-2 block">Current Status</label>
                        <div class="relative">
                            <select name="status" class="input-focus w-full px-5 py-4 bg-slate-50/50 border border-slate-200 rounded-2xl outline-none text-slate-700 font-medium appearance-none cursor-pointer">
                                <option value="AVAILABLE">Available</option>
                                <option value="CURRENTLY_TENANT">Currently Tenant</option>
                                <option value="MAINTENANCE">Maintenance</option>
                                <option value="CLEANING">Cleaning</option>
                            </select>
                            <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xs"></i>
                        </div>
                    </div>

                    <div>
                        <label class="text-[13px] font-bold text-slate-500 uppercase tracking-wider ml-1 mb-2 block">Room Category</label>
                        <div class="relative">
                            <select id="roomTypeSelect" name="type_room_id" required
                                    class="input-focus w-full px-5 py-4 bg-slate-50/50 border border-slate-200 rounded-2xl outline-none text-slate-700 font-medium appearance-none cursor-pointer">
                                <option value="">Đang tải danh sách...</option>
                            </select>
                            <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xs"></i>
                        </div>
                    </div>

                    <div class="col-span-2">
                        <label class="text-[13px] font-bold text-slate-500 uppercase tracking-wider ml-1 mb-2 block">Price per Night</label>
                        <div class="relative group">
                            <div class="absolute left-5 top-1/2 -translate-y-1/2 w-8 h-8 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center font-bold">₫</div>
                            <input type="text" id="priceDisplay" required
                                   class="input-focus w-full pl-16 pr-5 py-4 bg-slate-50/50 border border-slate-200 rounded-2xl outline-none text-slate-700 font-bold text-xl"
                                   placeholder="0"
                                   oninput="formatCurrency(this)">
                            <input type="hidden" id="priceOriginal" name="price">
                        </div>
                    </div>
                </div>

                <div class="pt-4">
                    <label class="text-[13px] font-bold text-slate-500 uppercase tracking-wider ml-1 mb-3 block">Room Gallery</label>
                    <div class="relative border-2 border-dashed border-slate-200 rounded-[1.5rem] p-12 text-center hover:border-blue-400 hover:bg-blue-50/20 transition-all cursor-pointer group"
                         onclick="document.getElementById('file-upload').click()">
                        <input id="file-upload" name="images" type="file" class="hidden" multiple accept="image/*" onchange="handleFiles(this.files)">
                        <div class="w-16 h-16 bg-blue-600/10 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                            <i class="fas fa-images text-2xl"></i>
                        </div>
                        <h3 class="text-lg font-bold text-slate-700">Drop your images here</h3>
                    </div>
                    <div id="preview-grid" class="mt-8 grid grid-cols-2 sm:grid-cols-4 gap-5"></div>
                </div>

                <div class="flex items-center justify-end gap-5 pt-10">
                    <button type="reset" id="btnReset" onclick="clearPreview()"
                            class="px-8 py-4 rounded-2xl font-bold text-slate-500 hover:bg-slate-100 transition-all uppercase text-xs tracking-widest">
                        Reset Form
                    </button>

                    <button type="button" id="btnDelete" onclick="handleDelete()"
                            class="hidden px-10 py-4 bg-red-50 text-red-600 hover:bg-red-600 hover:text-white rounded-2xl font-bold transition-all uppercase text-xs tracking-widest flex items-center gap-3">
                        <i class="fas fa-trash"></i> Delete
                    </button>

                    <button type="submit" id="btnSubmit"
                            class="px-10 py-4 bg-slate-900 hover:bg-blue-600 text-white rounded-2xl font-bold shadow-xl shadow-slate-200 transition-all active:scale-95 uppercase text-xs tracking-widest flex items-center gap-3">
                        <span id="submitText">Save Room</span>
                        <i id="submitIcon" class="fas fa-arrow-right text-[10px]"></i>
                    </button>
                </div>

            </form>
        </div>


    </div>
</main>

<script>
   // xửa lý price
    function formatCurrency(input) {
        // 1. Lấy giá trị người dùng nhập và xóa hết các ký tự không phải số
        let value = input.value.replace(/\D/g, "");

        // 2. Định dạng có dấu chấm ngăn cách hàng nghìn (7.000.000)
        if (value !== "") {
            // Chuyển thành số và định dạng theo chuẩn Việt Nam (.)
            let formattedValue = new Intl.NumberFormat('de-DE').format(value);
            input.value = formattedValue;

            // 3. Cập nhật giá trị số thuần túy vào input ẩn để gửi về Server
            document.getElementById('priceOriginal').value = value;
        } else {
            document.getElementById('priceOriginal').value = "";
        }
    }

    // Bổ sung: Khi Reset form thì xóa cả input ẩn
    document.querySelector('button[type="reset"]').addEventListener('click', () => {
        document.getElementById('priceOriginal').value = "";
    });
</script>
<script>
    function handleFiles(files) {
        const previewGrid = document.getElementById('preview-grid');
        for (const file of files) {
            if (!file.type.startsWith('image/')) continue;
            const reader = new FileReader();
            reader.onload = function(e) {
                const div = document.createElement('div');
                div.className = 'preview-card relative aspect-[4/3] rounded-[1.25rem] overflow-hidden border-2 border-white shadow-md ring-1 ring-slate-100';
                div.innerHTML = `
                    <img src="${e.target.result}" class="h-full w-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 hover:opacity-100 transition-opacity flex items-end p-3">
                         <span class="text-[10px] text-white font-bold truncate">${file.name}</span>
                    </div>
                `;
                previewGrid.appendChild(div);
            }
            reader.readAsDataURL(file);
        }
    }

    function clearPreview() {
        document.getElementById('preview-grid').innerHTML = '';
    }
</script>


<script>
    // load tên phòng
    // Chờ trang load xong mới chạy code
    document.addEventListener("DOMContentLoaded", function() {
        fetchRoomTypes();
    });

    async function fetchRoomTypes() {
        const selectElement = document.getElementById('roomTypeSelect');

        try {
            // Thay đổi URL này cho đúng với @RequestMapping ở Controller của bạn
            // Ví dụ: /api/v1/room-types
            const response = await fetch('/api/v1/roomtypes');
            const result = await response.json();

            // Lấy mảng dữ liệu từ đối tượng ApiResponse của bạn
            // Lưu ý: "result" ở đây phải khớp với tên biến trong class ApiResponse bên Java
            const roomTypes = result.data;

            selectElement.innerHTML = '<option value="">Select type</option>';

            roomTypes.forEach(type => {
                const option = document.createElement('option');
                option.value = type.id;
                option.textContent = type.type;
                selectElement.appendChild(option);
            });
        } catch (error) {
            console.error('Lỗi:', error);
            selectElement.innerHTML = '<option value="">Error loading data</option>';
        }
    }
</script>
<script>
    // submit
    document.getElementById('addRoomForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // Ngăn trang web load lại

        const form = e.target;
        const formData = new FormData(form); // Tự động lấy tất cả input kể cả file ảnh

        // Hiệu ứng nút bấm khi đang lưu
        const submitBtn = form.querySelector('button[type="submit"]');
        const originalBtnText = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Saving...</span>';

        try {
            const response = await fetch('/api/v1/rooms', {
                method: 'POST',
                body: formData
                // Không cần set Header Content-Type vì FormData sẽ tự động set Multipart/form-data
            });

            const result = await response.json();

            if (response.ok) {
                alert("Thêm phòng thành công!");
                form.reset(); // Xóa trắng form
                clearPreview(); // Xóa ảnh preview
                document.getElementById('priceOriginal').value = "";
            } else {
                alert("Lỗi: " + (result.message || "Không thể lưu phòng"));
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Lỗi kết nối đến Server!");
        } finally {
            // Trả lại trạng thái nút bấm
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalBtnText;
        }
    });
</script>
<script>
    // chuyển đổi giữa 2 form add và update

    // Khai báo các thành phần điều khiển
    const btnReset = document.getElementById('btnReset');
    const btnDelete = document.getElementById('btnDelete');
    const submitText = document.getElementById('submitText');
    const submitIcon = document.getElementById('submitIcon');
    const searchSection = document.getElementById('searchSection');

    // Xử lý khi nhấn menu UPDATE ROOM
    document.getElementById('menuUpdate').addEventListener('click', function() {
        // 1. Hiện thanh tìm kiếm & Nút xóa
        searchSection.classList.remove('hidden');
        btnDelete.classList.remove('hidden');

        // 2. Ẩn nút Reset
        btnReset.classList.add('hidden');

        // 3. Đổi nội dung nút Submit
        submitText.innerText = "Update Room";
        submitIcon.className = "fas fa-sync-alt text-[10px]"; // Đổi icon sang xoay

        // 4. Reset form để sẵn sàng nhập ID mới
        document.getElementById('addRoomForm').reset();
    });

    // Xử lý khi nhấn menu ADD ROOM
    document.getElementById('menuAdd').addEventListener('click', function() {
        // 1. Ẩn thanh tìm kiếm & Nút xóa
        searchSection.classList.add('hidden');
        btnDelete.classList.add('hidden');

        // 2. Hiện lại nút Reset
        btnReset.classList.remove('hidden');

        // 3. Đổi nội dung nút Submit về ban đầu
        submitText.innerText = "Save Room";
        submitIcon.className = "fas fa-arrow-right text-[10px]";

        // 4. Xóa ID cũ trong input ẩn (nếu có)
        document.getElementById('roomId').value = "";
        document.getElementById('addRoomForm').reset();
    });
</script>

</body>
</html>
