<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Khách Sạn | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" th:href="@{/roomform/base.css}">
    <link rel="stylesheet" th:href="@{/roomform/toast.css}">
    <link rel="stylesheet" th:href="@{/roomform/sidebar.css}">
    <link rel="stylesheet" th:href="@{/roomform/views-layout.css}">
    <link rel="stylesheet" th:href="@{/roomform/confirm-modal.css}">
    <link rel="stylesheet" th:href="@{/roomform/room-form.css}">
    <link rel="stylesheet" th:href="@{/roomform/room-type.css}">
    <link rel="stylesheet" th:href="@{/roomform/booking.css}">
    <link rel="stylesheet" th:href="@{/roomform/checkout-payment-modal.css}">
    <link rel="stylesheet" th:href="@{/roomform/revenue.css}">
    <link rel="stylesheet" th:href="@{/roomform/service.css}">
    <link rel="stylesheet" th:href="@{/roomform/add-service-modal.css}">
    <link rel="stylesheet" th:href="@{/roomform/information.css}">
</head>
<body class="bg-[#f8fafc] flex h-screen overflow-hidden text-slate-900">

<!-- ===== NÚT 3 GẠCH BẬT/TẮT MENU ===== -->
<button id="sbToggleBtn" onclick="toggleAppSidebar()" title="Đóng/Mở menu" aria-label="Đóng/Mở menu">
    <span class="sb-bars">
        <span class="sb-bar"></span>
        <span class="sb-bar"></span>
        <span class="sb-bar"></span>
    </span>
</button>

<!-- ===== SIDEBAR ===== -->
<th:block th:replace="~{admin/sidebar}"></th:block>

<!-- ===== MAIN: ADD / UPDATE FORM ===== -->
<th:block th:replace="~{admin/room-form-view}"></th:block>

<!-- ===== VIEW RESET STATUS ===== -->
<th:block th:replace="~{admin/reset-status-view}"></th:block>

<!-- ===== CHECK IN VIEW ===== -->
<th:block th:replace="~{admin/checkin-view}"></th:block>

<!-- ===== CHECK OUT VIEW ===== -->
<th:block th:replace="~{admin/checkout-view}"></th:block>

<!-- ===== BOOKING VIEW ===== -->
<th:block th:replace="~{admin/booking-view}"></th:block>

<!-- ===== VIEW ADD EMPLOYEE ===== -->
<th:block th:replace="~{admin/employee-add-view}"></th:block>

<!-- ===== VIEW UPDATE EMPLOYEE ===== -->
<th:block th:replace="~{admin/employee-update-view}"></th:block>

<!-- ===== VIEW MANAGE EMPLOYEES ===== -->
<th:block th:replace="~{admin/employee-manage-view}"></th:block>

<!-- ===== VIEW: ADD ROOM TYPE ===== -->
<th:block th:replace="~{admin/roomtype-add-view}"></th:block>

<!-- ===== VIEW: UPDATE ROOM TYPE ===== -->
<th:block th:replace="~{admin/roomtype-update-view}"></th:block>

<!-- ===== CI + CO CONFIRM MODAL ===== -->
<th:block th:replace="~{admin/checkin-confirm-modal}"></th:block>

<!-- ===== CHECKOUT PAYMENT MODAL ===== -->
<th:block th:replace="~{admin/checkout-payment-modal}"></th:block>

<!-- ===== CHECKOUT CONFIRM MODAL ===== -->
<th:block th:replace="~{admin/checkout-confirm-modal}"></th:block>

<!-- ===== VIEW REVENUE STATISTICS ===== -->
<th:block th:replace="~{admin/revenue-view}"></th:block>

<!-- ===== MAIN: SERVICE ROOM ===== -->
<th:block th:replace="~{admin/service-room-view}"></th:block>

<!-- ===== VIEW INFORMATION ===== -->
<th:block th:replace="~{admin/information-view}"></th:block>

<!-- ===== ADD SERVICE MODAL ===== -->
<th:block th:replace="~{admin/add-service-modal}"></th:block>

<!-- ===== MODAL ĐẶT DỊCH VỤ CHO PHÒNG ===== -->
<th:block th:replace="~{admin/room-service-modal}"></th:block>

<!-- ===== MODAL CHỌN PHÒNG (BOOKING OFF) ===== -->
<th:block th:replace="~{admin/select-room-modal}"></th:block>

<!-- ===== MODAL ĐĂNG NHẬP LẠI (TOKEN HẾT HẠN) ===== -->
<th:block th:replace="~{admin/relogin-modal}"></th:block>

<!-- ===== SCRIPTS ===== -->
<script th:src="@{/js/toast.js}"></script>
<script th:src="@{/js/header.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script th:src="@{/js/service.js}"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/room-form.js}"></script>
<script th:src="@{/js/reset-status.js}"></script>
<script th:src="@{/js/checkin.js}"></script>
<script th:src="@{/js/checkout.js}"></script>
<script th:src="@{/js/booking.js}"></script>
<script th:src="@{/js/room-type.js}"></script>
<script th:src="@{/js/employee.js}"></script>
<script th:src="@{/js/revenue.js}"></script>
<script th:src="@{/js/author.js}"></script>
<script th:src="@{/js/infomation.js}"></script>

</body>
</html>
