    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <style>
        /* ══ CONTACT MODAL ══ */
        .contact-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(17, 27, 52, 0.72);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 900;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: contactFadeIn 0.25s ease;
        }
        .contact-overlay.open { display: flex; }
        @keyframes contactFadeIn { from { opacity: 0; } to { opacity: 1; } }

        .contact-card {
            background: #ffffff;
            border-radius: 24px;
            width: 100%;
            max-width: 780px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(26,39,68,0.18);
            animation: contactSlideUp 0.32s cubic-bezier(.22,1,.36,1);
            position: relative;
        }
        @keyframes contactSlideUp {
            from { transform: translateY(40px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .contact-close {
            position: absolute;
            top: 18px; right: 18px;
            width: 36px; height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(26,39,68,0.08);
            color: #1a2744;
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, transform 0.2s;
            z-index: 5;
        }
        .contact-close:hover { background: rgba(26,39,68,0.15); transform: rotate(90deg); }

        .contact-body {
            display: grid;
            grid-template-columns: 260px 1fr;
        }

        .contact-sidebar {
            background: #1a2744;
            padding: 48px 32px 40px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .cs-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
        .cs-logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #c9a84c, #f0d080);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .cs-logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: #fff; letter-spacing: 0.5px; }
        .cs-logo-text span { color: #c9a84c; }
        .cs-tagline { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.6; margin-bottom: 36px; }
        .cs-divider { height: 1px; background: rgba(255,255,255,0.1); margin-bottom: 28px; }
        .cs-section-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #c9a84c; margin-bottom: 16px; }
        .cs-info-list { list-style: none; display: flex; flex-direction: column; gap: 18px; margin-bottom: 32px; }
        .cs-info-item { display: flex; gap: 14px; align-items: flex-start; }
        .cs-info-icon { width: 34px; height: 34px; border-radius: 8px; background: rgba(201,168,76,0.15); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
        .cs-info-label { font-size: 11px; color: rgba(255,255,255,0.45); margin-bottom: 2px; }
        .cs-info-value { font-size: 13.5px; font-weight: 500; color: #fff; }
        .cs-info-value a { color: #fff; text-decoration: none; }
        .cs-info-value a:hover { color: #f0d080; }
        .zalo-badge { display: inline-flex; align-items: center; gap: 6px; background: #0068FF; color: #fff; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 6px; margin-top: 4px; letter-spacing: 0.3px; text-decoration: none; }

        .contact-form-area { padding: 48px 40px 40px; }
        .cf-heading { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: #1a2744; margin-bottom: 6px; }
        .cf-sub { font-size: 13.5px; color: #8a8fa8; margin-bottom: 28px; }
        .cf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
        .cf-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .cf-label { font-size: 12px; font-weight: 600; color: #1a2744; letter-spacing: 0.3px; }
        .cf-input, .cf-textarea {
            font-family: 'DM Sans', sans-serif; font-size: 13.5px; color: #1a2744;
            background: #faf8f4; border: 1.5px solid #e8e4dc; border-radius: 10px;
            padding: 10px 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; width: 100%;
        }
        .cf-input:focus, .cf-textarea:focus { border-color: #c9a84c; box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
        .cf-textarea { resize: none; height: 88px; }
        .cf-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
        .cf-chip {
            font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
            padding: 5px 13px; border-radius: 20px; border: 1.5px solid #e8e4dc;
            background: #fff; color: #8a8fa8; cursor: pointer; transition: all 0.18s;
        }
        .cf-chip:hover, .cf-chip.active { border-color: #c9a84c; background: rgba(201,168,76,0.1); color: #1a2744; }
        .cf-btn {
            width: 100%; padding: 13px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #c9a84c, #f0d080);
            color: #1a2744; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700;
            cursor: pointer; transition: transform 0.18s, box-shadow 0.18s; letter-spacing: 0.3px;
        }
        .cf-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,168,76,0.38); }
        .cf-btn:active { transform: translateY(0); }
        .cf-success { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 48px 24px; gap: 14px; }
        .cf-success.show { display: flex; }
        .cf-form-inner.hidden { display: none; }
        .success-icon { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #c9a84c, #f0d080); display: flex; align-items: center; justify-content: center; font-size: 28px; animation: contactPop 0.4s cubic-bezier(.22,1,.36,1); }
        @keyframes contactPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .success-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: #1a2744; }
        .success-desc { font-size: 13.5px; color: #8a8fa8; line-height: 1.6; }
        .btn-back { margin-top: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: #c9a84c; background: none; border: none; cursor: pointer; text-decoration: underline; }

        @media (max-width: 640px) {
            .contact-body { grid-template-columns: 1fr; }
            .contact-sidebar { padding: 32px 24px 28px; }
            .contact-form-area { padding: 32px 24px 28px; }
            .cf-row { grid-template-columns: 1fr; }
            .contact-card { border-radius: 18px; }
        }
    </style>
</head>
