<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lịch Sử Đặt Phòng</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --gold: #C9A96E;
            --gold-light: #E8D5B0;
            --dark: #0F0E0C;
            --dark-2: #1A1815;
            --dark-3: #252320;
            --text: #E8E4DC;
            --text-muted: #8C8880;
            --border: rgba(201,169,110,0.2);
            --status-checkin: #4CAF7D;
            --status-checkout: #E07A5F;
            --status-pending: #F4A261;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── OVERLAY BACKDROP ── */
        .backdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

        /* ── DRAWER / PANEL ── */
        .drawer {
            background: var(--dark-2);
            border: 1px solid var(--border);
            border-radius: 4px;
            width: 100%;
            max-width: 860px;
            max-height: 92vh;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1);
            overflow: hidden;
        }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity:0 }
            to   { transform: translateY(0);    opacity:1 }
        }

        /* ── HEADER ── */
        .drawer-header {
            padding: 28px 32px 0;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .header-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .header-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 26px;
            font-weight: 600;
            color: var(--gold-light);
            letter-spacing: 0.02em;
        }
        .header-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .close-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 34px; height: 34px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .close-btn:hover { border-color: var(--gold); color: var(--gold); }

        /* ── TABS ── */
        .tabs {
            display: flex;
            gap: 0;
        }
        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 14px 24px;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0; right: 0;
            height: 2px;
            background: var(--gold);
            transform: scaleX(0);
            transition: transform 0.25s ease;
        }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { color: var(--gold); }
        .tab-btn.active::after { transform: scaleX(1); }

        .tab-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .tab-btn[data-tab="checkout"] .tab-dot { background: var(--status-checkout); }
        .tab-btn[data-tab="checkin"]  .tab-dot { background: var(--status-checkin); }
        .tab-btn[data-tab="pending"]  .tab-dot { background: var(--status-pending); }

        /* ── BODY ── */
        .drawer-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }
        .drawer-body::-webkit-scrollbar { width: 4px; }
        .drawer-body::-webkit-scrollbar-track { background: transparent; }
        .drawer-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── LOADING / EMPTY / ERROR ── */
        .state-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 220px;
            gap: 12px;
            color: var(--text-muted);
        }
        .state-icon { font-size: 36px; opacity: 0.5; }
        .state-text { font-size: 13px; letter-spacing: 0.04em; }

        .spinner {
            width: 28px; height: 28px;
            border: 2px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg) } }

        /* ── BOOKING CARDS ── */
        .booking-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .booking-card {
            background: var(--dark-3);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 20px 24px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 16px 20px;
            align-items: start;
            transition: border-color 0.2s, transform 0.2s;
            animation: cardIn 0.3s ease both;
        }
        .booking-card:hover {
            border-color: rgba(201,169,110,0.4);
            transform: translateY(-1px);
        }
        @keyframes cardIn {
            from { opacity:0; transform: translateY(8px) }
            to   { opacity:1; transform: translateY(0) }
        }

        .card-index {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            color: var(--gold);
            opacity: 0.5;
            line-height: 1;
            padding-top: 2px;
            min-width: 28px;
        }

        .card-info {}
        .card-room {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--gold-light);
            margin-bottom: 6px;
        }
        .card-customer {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .card-dates {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .date-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .date-label {
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        .date-value {
            font-size: 13px;
            color: var(--text);
        }

        .card-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }
        .card-price {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--gold);
        }
        .card-price.no-price {
            font-size: 13px;
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
        }
        .status-badge {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 2px;
        }
        .badge-checkin  { background: rgba(76,175,125,0.15); color: var(--status-checkin); border: 1px solid rgba(76,175,125,0.3); }
        .badge-checkout { background: rgba(224,122,95,0.15); color: var(--status-checkout); border: 1px solid rgba(224,122,95,0.3); }
        .badge-pending  { background: rgba(244,162,97,0.15); color: var(--status-pending); border: 1px solid rgba(244,162,97,0.3); }

        .booking-id {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ── DIVIDER ── */
        .card-divider {
            grid-column: 1 / -1;
            height: 1px;
            background: var(--border);
            margin: 4px 0;
            opacity: 0.5;
        }

        /* ── DEMO TRIGGER BUTTON (for preview only) ── */
        .demo-trigger {
            position: fixed;
            bottom: 32px; right: 32px;
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 14px 24px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
            z-index: 10;
            transition: background 0.2s;
        }
        .demo-trigger:hover { background: var(--gold-light); }
    </style>
</head>
<body>

<!-- Demo trigger (xóa khi tích hợp thật) -->
<button class="demo-trigger" onclick="openBookingHistory()">Lịch Sử Đặt Phòng</button>

<!-- ── BACKDROP + DRAWER ── -->
<div class="backdrop" id="backdrop" style="display:none" onclick="handleBackdropClick(event)">
    <div class="drawer" id="drawer">

        <!-- Header -->
        <div class="drawer-header">
            <div class="header-top">
                <div>
                    <div class="header-title">Lịch Sử Đặt Phòng</div>
                    <div class="header-subtitle" id="customerLabel">Đang tải...</div>
                </div>
                <button class="close-btn" onclick="closeBookingHistory()">✕</button>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="checkout" onclick="switchTab('checkout', this)">
                    <span class="tab-dot"></span>Đã Trả Phòng
                </button>
                <button class="tab-btn" data-tab="checkin" onclick="switchTab('checkin', this)">
                    <span class="tab-dot"></span>Đang Ở
                </button>
                <button class="tab-btn" data-tab="pending" onclick="switchTab('pending', this)">
                    <span class="tab-dot"></span>Chờ Xác Nhận
                </button>
            </div>
        </div>

        <!-- Body -->
        <div class="drawer-body" id="drawerBody">
            <div class="state-box">
                <div class="spinner"></div>
                <div class="state-text">Đang tải dữ liệu...</div>
            </div>
        </div>

    </div>
</div>

<script>
    const BASE_URL = 'http://localhost:8080'; // ← đổi thành URL thật của bạn
    let currentTab = 'checkout';
    let cache = {};

    // Lấy customerId từ localStorage
    function getCustomerId() {
        // Thử các key phổ biến
        return localStorage.getItem('customerId')
            || localStorage.getItem('userId')
            || localStorage.getItem('id')
            || null;
    }

    function openBookingHistory() {
        document.getElementById('backdrop').style.display = 'flex';
        document.body.style.overflow = 'hidden';
        cache = {};
        currentTab = 'checkout';

        // Reset active tab UI
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="checkout"]').classList.add('active');

        const customerId = getCustomerId();
        if (customerId) {
            document.getElementById('customerLabel').textContent = `Mã khách hàng: ${customerId}`;
        } else {
            document.getElementById('customerLabel').textContent = 'Khách hàng';
        }

        fetchTab('checkout');
    }

    function closeBookingHistory() {
        document.getElementById('backdrop').style.display = 'none';
        document.body.style.overflow = '';
    }

    function handleBackdropClick(e) {
        if (e.target === document.getElementById('backdrop')) closeBookingHistory();
    }

    function switchTab(tab, btnEl) {
        if (currentTab === tab) return;
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btnEl.classList.add('active');
        fetchTab(tab);
    }

    const API_MAP = {
        checkout: (id) => `${BASE_URL}/api/v1/booking/storychcekout/${id}`,
        checkin:  (id) => `${BASE_URL}/api/v1/booking/storychcekin/${id}`,
        pending:  (id) => `${BASE_URL}/api/v1/booking/storypending/${id}`,
    };

    async function fetchTab(tab) {
        const body = document.getElementById('drawerBody');

        // Hiện cache nếu có
        if (cache[tab]) {
            renderList(cache[tab], tab, body);
            return;
        }

        const customerId = getCustomerId();
        if (!customerId) {
            renderError(body, 'Không tìm thấy thông tin khách hàng trong hệ thống.');
            return;
        }

        renderLoading(body);

        try {
            const res = await fetch(API_MAP[tab](customerId), {
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('token') || ''}`,
                    'Content-Type': 'application/json'
                }
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            cache[tab] = data;
            renderList(data, tab, body);
        } catch (err) {
            renderError(body, `Không thể tải dữ liệu. (${err.message})`);
        }
    }

    function renderLoading(body) {
        body.innerHTML = `
      <div class="state-box">
        <div class="spinner"></div>
        <div class="state-text">Đang tải dữ liệu...</div>
      </div>`;
    }

    function renderError(body, msg) {
        body.innerHTML = `
      <div class="state-box">
        <div class="state-icon">⚠</div>
        <div class="state-text">${msg}</div>
      </div>`;
    }

    const TAB_META = {
        checkout: { label: 'Đã Trả Phòng', badgeClass: 'badge-checkout', emptyIcon: '🏨', emptyText: 'Chưa có lịch sử trả phòng' },
        checkin:  { label: 'Đang Ở',       badgeClass: 'badge-checkin',  emptyIcon: '🛎',  emptyText: 'Không có phòng đang ở' },
        pending:  { label: 'Chờ Xác Nhận', badgeClass: 'badge-pending',  emptyIcon: '📋', emptyText: 'Không có đặt phòng đang chờ' },
    };

    function renderList(data, tab, body) {
        if (!data || data.length === 0) {
            const m = TAB_META[tab];
            body.innerHTML = `
        <div class="state-box">
          <div class="state-icon">${m.emptyIcon}</div>
          <div class="state-text">${m.emptyText}</div>
        </div>`;
            return;
        }

        const { badgeClass, label } = TAB_META[tab];
        const html = data.map((item, i) => buildCard(item, i, badgeClass, label)).join('');
        body.innerHTML = `<div class="booking-list">${html}</div>`;
    }

    function formatDate(dt) {
        if (!dt) return '—';
        const d = new Date(dt);
        if (isNaN(d)) return dt;
        return d.toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' })
            + ' ' + d.toLocaleTimeString('vi-VN', { hour:'2-digit', minute:'2-digit' });
    }

    function formatPrice(price) {
        if (price == null || price === 0) return null;
        return new Intl.NumberFormat('vi-VN', { style:'currency', currency:'VND' }).format(price);
    }

    function buildCard(item, i, badgeClass, statusLabel) {
        const price = formatPrice(item.price);
        const delay = i * 0.06;
        return `
    <div class="booking-card" style="animation-delay:${delay}s">
      <div class="card-index">${String(i + 1).padStart(2, '0')}</div>

      <div class="card-info">
        <div class="card-room">${item.roomName || 'Phòng không xác định'}</div>
        <div class="card-customer">👤 ${item.cutomerName || '—'}</div>
        <div class="card-dates">
          <div class="date-item">
            <span class="date-label">Nhận phòng</span>
            <span class="date-value">${formatDate(item.checkInDate)}</span>
          </div>
          <div class="date-item">
            <span class="date-label">Trả phòng</span>
            <span class="date-value">${formatDate(item.checkOutDate)}</span>
          </div>
          ${item.enventCheckInTime ? `
          <div class="date-item">
            <span class="date-label">Dự kiến nhận</span>
            <span class="date-value">${formatDate(item.enventCheckInTime)}</span>
          </div>` : ''}
          ${item.enventCheckOutTime ? `
          <div class="date-item">
            <span class="date-label">Dự kiến trả</span>
            <span class="date-value">${formatDate(item.enventCheckOutTime)}</span>
          </div>` : ''}
        </div>
      </div>

      <div class="card-right">
        <span class="status-badge ${badgeClass}">${statusLabel}</span>
        <div class="${price ? 'card-price' : 'card-price no-price'}">
          ${price || 'Chưa thanh toán'}
        </div>
        <div class="booking-id">#${item.bookingId}</div>
      </div>
    </div>`;
    }

    // Nếu muốn tự động mở khi load trang (bỏ comment dòng dưới khi tích hợp)
    // document.addEventListener('DOMContentLoaded', openBookingHistory);
</script>
</body>
</html>
